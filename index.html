<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CWHL NHL League Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:    #1a5276;
    --teal2:   #366c8e;
    --teal3:   #d6eaf8;
    --ice:     #f0f7ff;
    --white:   #ffffff;
    --grey1:   #f2f3f4;
    --grey2:   #d5d8dc;
    --grey3:   #888;
    --black:   #111;
    --accent:  #e74c3c;
    --gold:    #f39c12;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--ice);
    color: var(--black);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--teal);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 26px;
    color: #fff;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .logo span { color: var(--gold); }
  nav {
    display: flex;
    gap: 4px;
    flex: 1;
    overflow-x: auto;
  }
  nav button {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.7);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  nav button:hover { background: rgba(255,255,255,0.1); color: #fff; }
  nav button.active { background: rgba(255,255,255,0.18); color: #fff; }

  /* ── MAIN ── */
  main { padding: 24px; max-width: 1600px; margin: 0 auto; padding-top: 20px; }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--teal);
    letter-spacing: 1px;
    margin-bottom: 8px;
    text-transform: uppercase;
    border-left: 5px solid var(--gold);
    padding-left: 12px;
    background: var(--ice);
    padding-top: 8px;
    padding-bottom: 4px;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
    background: var(--ice);
    padding: 8px 0;
    position: sticky;
    top: 64px;
    z-index: 20;
  }
  .search-box {
    display: flex;
    align-items: center;
    background: #fff;
    border: 1.5px solid var(--grey2);
    border-radius: 6px;
    padding: 6px 12px;
    gap: 8px;
    min-width: 220px;
  }
  .search-box input {
    border: none;
    outline: none;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    width: 100%;
    color: var(--black);
    background: transparent;
  }
  .search-icon { color: var(--grey3); font-size: 16px; }
  .filter-label {
    font-size: 13px;
    color: var(--grey3);
    font-weight: 500;
  }
  select.pos-filter {
    border: 1.5px solid var(--grey2);
    border-radius: 6px;
    padding: 7px 10px;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    background: #fff;
    color: var(--black);
    cursor: pointer;
    outline: none;
  }
  .record-count {
    font-size: 13px;
    color: var(--grey3);
    margin-left: auto;
  }

  /* ── TABLE WRAPPER ── */
  .table-wrap {
    overflow-x: auto;
    overflow-y: auto;
    max-height: calc(100vh - 180px);
    border-radius: 8px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    background: #fff;
  }
  .table-wrap thead tr {
    position: sticky;
    top: 0;
    z-index: 5;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 900px;
  }
  table td, table th { min-width: 48px; }
  table th:first-child, table td:first-child { min-width: 36px; max-width: 36px; width: 36px; }
  thead tr {
    background: var(--teal);
    color: #fff;
  }
  thead th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 10px 10px;
    text-align: center;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    border-right: 1px solid rgba(255,255,255,0.1);
    transition: background 0.15s;
  }
  thead th:first-child { text-align: left; padding-left: 14px; }
  thead th:hover { background: var(--teal2); }
  thead th.sorted-asc::after  { content: ' ▲'; font-size: 10px; }
  thead th.sorted-desc::after { content: ' ▼'; font-size: 10px; }

  tbody tr { border-bottom: 1px solid #eee; transition: background 0.1s; }
  tbody tr:nth-child(even) { background: var(--grey1); }
  tbody tr:hover { background: var(--teal3) !important; }
  tbody td {
    padding: 8px 10px;
    text-align: center;
    white-space: nowrap;
    color: var(--black);
  }
  tbody td:first-child { text-align: left; padding-left: 14px; font-weight: 600; min-width: 150px; }
  .rank-cell { color: var(--grey3); font-size: 12px; width: 32px; min-width: 32px; text-align: center; }
  .player-name { font-weight: 600; color: var(--teal); min-width: 150px; display: inline-block; }
  .team-badge { min-width: 40px;
    display: inline-block;
    background: var(--teal3);
    color: var(--teal);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.5px;
  }
  .pts-cell { font-weight: 700; color: var(--teal); }
  .adv-cell { color: var(--teal2); font-style: italic; font-size: 12px; }
  .pos-badge {
    display: inline-block;
    background: var(--grey2);
    color: var(--grey3);
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'Barlow Condensed', sans-serif;
  }

  /* ── STANDINGS ── */
  .standings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 32px;
  }
  @media (max-width: 700px) { .standings-grid { grid-template-columns: 1fr; } }
  .division-block { background: #fff; border-radius: 8px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); overflow: hidden; }
  .division-title {
    background: var(--teal);
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 1px;
    padding: 10px 16px;
    text-transform: uppercase;
  }
  .division-title span { color: var(--gold); margin-right: 6px; }
  .stand-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .stand-table thead tr { background: var(--teal2); color: #fff; }
  .stand-table thead th {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    padding: 7px 10px;
    text-align: center;
    font-size: 12px;
    letter-spacing: 0.5px;
  }
  .stand-table thead th:first-child { text-align: left; padding-left: 14px; }
  .stand-table tbody tr { border-bottom: 1px solid #eee; }
  .stand-table tbody tr:nth-child(even) { background: var(--grey1); }
  .stand-table tbody td { padding: 8px 10px; text-align: center; color: var(--black); }
  .stand-table tbody td:first-child { text-align: left; padding-left: 14px; font-weight: 600; }
  .pts-bold { font-weight: 700; color: var(--teal); }

  /* ── TEAM TABS ── */
  .team-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .team-btn {
    background: #fff;
    border: 1.5px solid var(--grey2);
    border-radius: 5px;
    padding: 6px 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    color: var(--teal);
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .team-btn:hover { background: var(--teal3); border-color: var(--teal); }
  .team-btn.active { background: var(--teal); color: #fff; border-color: var(--teal); }
  .team-banner {
    background: var(--teal);
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 2px;
    padding: 12px 18px;
    border-radius: 8px 8px 0 0;
    text-transform: uppercase;
  }
  .subsection-label {
    background: var(--teal3);
    color: var(--teal);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 6px 14px;
    text-transform: uppercase;
  }
  .totals-row td { background: var(--grey2) !important; font-weight: 700; color: var(--black) !important; }

  /* ── LOADING / EMPTY ── */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--grey3);
    font-size: 16px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--grey2);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── PAGE VISIBILITY ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 24px;
    color: var(--grey3);
    font-size: 12px;
    margin-top: 40px;
  }

  /* ── PLAYER CARD MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-card {
    background: #fff;
    border-radius: 12px;
    width: 100%;
    max-width: 700px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 48px rgba(0,0,0,0.3);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .modal-header {
    background: var(--teal);
    color: #fff;
    padding: 20px 24px 16px;
    border-radius: 12px 12px 0 0;
    position: relative;
  }
  .modal-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .modal-meta {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    margin-top: 4px;
    display: flex;
    gap: 16px;
  }
  .modal-meta span { display: flex; align-items: center; gap: 5px; }
  .modal-close {
    position: absolute;
    top: 16px; right: 18px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 20px;
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.3); }
  .modal-body { padding: 20px 24px 24px; }
  .stat-section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--grey3);
    margin: 18px 0 10px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--grey2);
  }
  .stat-section-title:first-child { margin-top: 0; }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
  }
  .stat-box {
    background: var(--ice);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
    border: 1px solid var(--grey2);
  }
  .stat-box.highlight { background: var(--teal3); border-color: var(--teal); }
  .stat-box.advanced  { background: #fef9f0; border-color: #f39c12; }
  .stat-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--teal);
    line-height: 1;
  }
  .stat-box.highlight .stat-val { color: var(--teal); }
  .stat-box.advanced  .stat-val { color: var(--gold); }
  .stat-lbl {
    font-size: 10px;
    font-weight: 600;
    color: var(--grey3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }
  .player-name.clickable {
    cursor: pointer;
    text-decoration: underline;
    text-decoration-style: dotted;
    text-underline-offset: 3px;
  }
  .player-name.clickable:hover { color: var(--teal2); }

  /* ── RECENT GAMES ── */
  .games-grid { display: flex; flex-direction: column; gap: 10px; }
  .game-card {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 0;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .game-card:hover { border-color: var(--teal); box-shadow: 0 4px 20px rgba(26,82,118,0.15); }
  .game-date {
    font-size: 11px;
    color: var(--grey3);
    min-width: 120px;
    font-weight: 500;
  }
  .game-teams {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .game-team {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 140px;
  }
  .game-team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--black);
    text-align: center;
    letter-spacing: 0.3px;
  }
  .game-team-name.winner { color: var(--teal); }
  .game-score-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .game-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--teal);
    line-height: 1;
    min-width: 40px;
    text-align: center;
  }
  .game-score.loser { color: var(--grey2); }
  .game-sep {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    color: var(--grey3);
    font-weight: 400;
  }
  .game-badge {
    display: flex;
    gap: 6px;
    font-size: 10px;
  }
  .badge {
    background: var(--teal3);
    color: var(--teal);
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.5px;
    font-size: 11px;
  }
  .badge.ot   { background: #fef9f0; color: var(--gold); }
  .badge.lgot { background: #fdf2f2; color: var(--accent); }
  .game-arrow {
    color: var(--grey3);
    font-size: 18px;
    margin-left: 12px;
  }

  /* ── BOX SCORE MODAL ── */
  .box-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 2000;
    align-items: flex-start;
    justify-content: center;
    padding: 20px;
    overflow-y: auto;
  }
  .box-modal-overlay.open { display: flex; }
  .box-modal {
    background: #fff;
    border-radius: 12px;
    width: 100%;
    max-width: 1100px;
    margin: auto;
    box-shadow: 0 8px 48px rgba(0,0,0,0.3);
    animation: slideUp 0.2s ease;
    overflow: hidden;
  }
  .box-header {
    background: var(--teal);
    color: #fff;
    padding: 18px 24px;
    position: relative;
  }
  .box-scoreline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 1px;
    text-align: center;
  }
  .box-meta {
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-top: 4px;
  }
  .box-close {
    position: absolute;
    top: 14px; right: 18px;
    background: rgba(255,255,255,0.15);
    border: none; color: #fff;
    font-size: 18px; width: 30px; height: 30px;
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .box-close:hover { background: rgba(255,255,255,0.3); }
  .box-body { padding: 0 0 20px; }
  .box-team-section {
    padding: 0 20px 16px;
  }
  .box-team-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 900;
    color: var(--teal);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 14px 0 8px;
    border-bottom: 2px solid var(--teal3);
    margin-bottom: 8px;
  }
  .box-table-wrap { overflow-x: auto; }
  .box-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    min-width: 600px;
  }
  .box-table thead tr { background: var(--teal2); color: #fff; }
  .box-table thead th {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    padding: 7px 8px;
    text-align: center;
    white-space: nowrap;
    font-size: 12px;
  }
  .box-table thead th:first-child { text-align: left; padding-left: 12px; }
  .box-table tbody tr { border-bottom: 1px solid #eee; }
  .box-table tbody tr:nth-child(even) { background: var(--grey1); }
  .box-table tbody td { padding: 7px 8px; text-align: center; color: var(--black); white-space: nowrap; }
  .box-table tbody td:first-child { text-align: left; padding-left: 12px; font-weight: 600; color: var(--teal); }
  .box-divider { height: 1px; background: var(--grey2); margin: 0 20px; }
</style>
</head>
<body>

<header>
  <div class="logo">CWHL <span>NHL</span></div>
  <nav id="main-nav">
    <button class="active" onclick="showPage('standings', this)">Standings</button>
    <button onclick="showPage('players', this)">Player Stats</button>
    <button onclick="showPage('goalies', this)">Goalie Stats</button>
    <button onclick="showPage('teams', this)">Teams</button>
    <button onclick="showPage('games', this)">Recent Games</button>
  </nav>
</header>

<main>

  <!-- STANDINGS -->
  <div class="page active" id="page-standings">
    <div class="section-title">Standings</div>
    <div class="standings-grid" id="standings-grid">
      <div class="loading"><div class="spinner"></div>Loading standings...</div>
    </div>
  </div>

  <!-- PLAYER STATS -->
  <div class="page" id="page-players">
    <div class="section-title">Player Stats</div>
    <div class="controls">
      <div class="search-box">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="player-search" placeholder="Search player..." oninput="filterPlayers()">
      </div>
      <span class="filter-label">Position:</span>
      <select class="pos-filter" id="pos-filter" onchange="filterPlayers()">
        <option value="">All</option>
        <option value="C">Center</option>
        <option value="W">Wing</option>
        <option value="D">Defense</option>
      </select>
      <span class="filter-label">Team:</span>
      <select class="pos-filter" id="team-filter" onchange="filterPlayers()">
        <option value="">All Teams</option>
      </select>
      <span class="record-count" id="player-count"></span>
    </div>
    <div class="table-wrap" id="player-table-wrap">
      <div class="loading"><div class="spinner"></div>Loading player stats...</div>
    </div>
  </div>

  <!-- GOALIE STATS -->
  <div class="page" id="page-goalies">
    <div class="section-title">Goalie Stats</div>
    <div class="controls">
      <div class="search-box">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="goalie-search" placeholder="Search goalie..." oninput="filterGoalies()">
      </div>
      <span class="record-count" id="goalie-count"></span>
    </div>
    <div class="table-wrap" id="goalie-table-wrap">
      <div class="loading"><div class="spinner"></div>Loading goalie stats...</div>
    </div>
  </div>

  <!-- TEAMS -->
  <div class="page" id="page-teams">
    <div class="section-title">Team Rosters</div>
    <div class="team-nav" id="team-nav"></div>
    <div id="team-content">
      <div class="loading"><div class="spinner"></div>Loading team data...</div>
    </div>
  </div>


  <!-- RECENT GAMES -->
  <div class="page" id="page-games">
    <div class="section-title">Recent Games</div>
    <div class="controls">
      <span class="filter-label">Filter by team:</span>
      <select class="pos-filter" id="game-team-filter" onchange="filterGames()">
        <option value="">All Teams</option>
      </select>
      <span class="record-count" id="game-count"></span>
    </div>
    <div id="games-list">
      <div class="loading"><div class="spinner"></div>Loading games...</div>
    </div>
  </div>

</main>

<footer>CWHL NHL League Stats &mdash; Updated automatically each game night</footer>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// Your publish sheet ID — the one stats_publisher.py writes to
const SHEET_ID        = "1wPIBS4LOp6ciuUxp7IjtvEG7sjAok4c_FeNu0zzHU6I"; // publish sheet
const SOURCE_SHEET_ID = "1KfHr5l2ms5d6dfgaDDACZVNymolxJw5ZSNfGkSlwPxU"; // scraper sheet (Game/Skater/Goalie Log)

const DIVISIONS = {
  "East": ["TOR","OTT","MTL","CAR","CBJ"],
  "West": ["LAK","SJS","VGK","DAL","NSH"]
};

const TEAMS = [
  {abbr:"CAR", name:"Carolina Hurricanes"},
  {abbr:"CBJ", name:"Columbus Blue Jackets"},
  {abbr:"SJS", name:"San Jose Sharks"},
  {abbr:"LAK", name:"LA Kings"},
  {abbr:"DAL", name:"Dallas Stars"},
  {abbr:"VGK", name:"Vegas Golden Knights"},
  {abbr:"TOR", name:"Toronto Maple Leafs"},
  {abbr:"NSH", name:"Nashville Predators"},
  {abbr:"OTT", name:"Ottawa Senators"},
  {abbr:"MTL", name:"Montreal Canadiens"},
];

// ── SHEET FETCH ───────────────────────────────────────────────────────────────
async function fetchTab(tabName) {
  // headers=1 tells gviz the first row IS the header — it returns col labels
  // AND all data rows separately, so we get clean header + data split
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}&headers=1`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} fetching ${tabName}`);
  const text = await res.text();
  const json = JSON.parse(text.substring(47, text.length - 2));
  const numCols = json.table.cols.length;
  // col labels come from json.table.cols[i].label
  const cols = json.table.cols.map(c => String(c.label || ""));
  const rows = (json.table.rows || []).map(r => {
    const cells = [];
    for (let i = 0; i < numCols; i++) {
      const cell = r.c ? r.c[i] : null;
      // Always use raw value (v) not formatted (f) to avoid
      // gviz auto-formatting decimals as percentages
      const val = cell && cell.v !== null && cell.v !== undefined
        ? String(cell.v) : "";
      cells.push(String(val));
    }
    return cells;
  });
  // Post-process: gviz returns percentage strings (e.g. "39.5%") as decimals (0.395)
  // Detect known pct columns by name and reformat them
  const PCT_COLS = new Set([
    "Shot %", "Shots On Net %", "Pass %", "Faceoff %",
    "Breakaway Save %", "Penalty Shot Save %", "Save %",
    "EV Sh%", "Breakaway Save %", "Penalty Shot Save %",
  ]);
  cols.forEach((colName, ci) => {
    if (!PCT_COLS.has(String(colName).trim())) return;
    rows.forEach(row => {
      const v = row[ci];
      if (v === "" || v === "-") return;
      const n = parseFloat(v);
      if (!isNaN(n) && n >= 0 && n <= 1) {
        row[ci] = (n * 100).toFixed(1) + "%";
      } else if (!isNaN(n) && n > 1) {
        // Already a percentage number, just add %
        row[ci] = n.toFixed(1) + "%";
      }
    });
  });

  return { cols, rows, numCols };
}

// Fetch from the SOURCE (scraper) sheet instead of publish sheet
async function fetchSourceTab(tabName) {
  const url = `https://docs.google.com/spreadsheets/d/${SOURCE_SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}&headers=1`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} fetching ${tabName}`);
  const text = await res.text();
  const json = JSON.parse(text.substring(47, text.length - 2));
  const numCols = json.table.cols.length;
  const cols = json.table.cols.map(c => String(c.label || ""));
  const rows = (json.table.rows || []).map(r => {
    const cells = [];
    for (let i = 0; i < numCols; i++) {
      const cell = r.c ? r.c[i] : null;
      const val = cell && cell.v !== null && cell.v !== undefined ? String(cell.v) : "";
      cells.push(val);
    }
    return cells;
  });
  return { cols, rows, numCols };
}

// ── PAGE SWITCHING ────────────────────────────────────────────────────────────
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const pageEl = document.getElementById('page-' + id);
  if (pageEl) pageEl.classList.add('active');
  if (btn) btn.classList.add('active');
}

// ── SORT STATE ────────────────────────────────────────────────────────────────
const sortState = { players: {col: -1, dir: -1}, goalies: {col: -1, dir: -1} };

// ── STANDINGS ─────────────────────────────────────────────────────────────────
async function loadStandings() {
  try {
    const { cols, rows } = await fetchTab("Standings");
    // rows are data-only (gviz headers=1 already separated header)
    const teamData = {};
    rows.forEach(r => {
      const team = String(r[0] || "").trim();
      if (!team || team === "TEAM" || !r[1]) return;
      teamData[team] = {
        gp:  Number(r[1]) || 0,
        w:   Number(r[2]) || 0,
        l:   Number(r[3]) || 0,
        otl: Number(r[4]) || 0,
        pts: Number(r[5]) || 0,
      };
    });

    // Build abbreviation → full name map
    const abbrToFull = {};
    const fullToAbbr = {};
    TEAMS.forEach(t => {
      abbrToFull[t.abbr] = t.name;
      fullToAbbr[t.name.toLowerCase()] = t.abbr;
    });

    // Match team data to abbreviations
    function getTeamData(abbr) {
      // Try exact match first, then partial
      for (const [name, data] of Object.entries(teamData)) {
        const nameLower = name.toLowerCase();
        const fullLower = (abbrToFull[abbr] || "").toLowerCase();
        if (nameLower === fullLower || nameLower.includes(abbr.toLowerCase()) ||
            (fullLower && fullLower.split(" ").some(w => nameLower.includes(w) && w.length > 3))) {
          return data;
        }
      }
      return { gp:0, w:0, l:0, otl:0, pts:0 };
    }

    let html = "";
    for (const [divName, abbrs] of Object.entries(DIVISIONS)) {
      const divTeams = abbrs.map(abbr => ({
        abbr,
        name: abbrToFull[abbr] || abbr,
        ...getTeamData(abbr)
      })).sort((a,b) => b.pts - a.pts || b.w - a.w);

      html += `
        <div class="division-block">
          <div class="division-title"><span>&#9670;</span>${divName}</div>
          <table class="stand-table">
            <thead><tr>
              <th>TEAM</th><th>GP</th><th>W</th><th>L</th><th>OTL</th><th>PTS</th>
            </tr></thead>
            <tbody>
              ${divTeams.map((t,i) => `
                <tr>
                  <td>${t.name}</td>
                  <td>${t.gp}</td><td>${t.w}</td><td>${t.l}</td><td>${t.otl}</td>
                  <td class="pts-bold">${t.pts}</td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>`;
    }
    document.getElementById("standings-grid").innerHTML = html;
  } catch(e) {
    document.getElementById("standings-grid").innerHTML = `<div class="loading">Error loading standings: ${e.message}</div>`;
  }
}

// ── PLAYER STATS ──────────────────────────────────────────────────────────────
let playerData = { cols: [], rows: [] };

function posGroup(pos) {
  const p = String(pos).toLowerCase();
  if (p.includes("center")) return "C";
  if (p.includes("wing") || p.includes("lw") || p.includes("rw")) return "W";
  if (p.includes("defense") || p.includes("def")) return "D";
  return "";
}

function posShort(pos) {
  const g = posGroup(pos);
  if (g === "C") return "C";
  if (g === "W") return pos.toLowerCase().includes("left") ? "LW" : "RW";
  if (g === "D") return "D";
  return pos;
}

async function loadPlayers() {
  try {
    const raw = await fetchTab("Player Stats");
    // cols come from gviz col labels (row 1 of sheet), rows are data only
    playerData = { cols: raw.cols, rows: raw.rows, numCols: raw.numCols };
    const teams = [...new Set(playerData.rows.map(r => String(r[2]||"")).filter(Boolean))].sort();
    const sel = document.getElementById("team-filter");
    teams.forEach(t => { const o = document.createElement("option"); o.value = t; o.textContent = t; sel.appendChild(o); });
    // Set default sort to PTS column by name
    const ptsIdx = playerData.cols.findIndex(h => h.trim() === "PTS");
    if (ptsIdx !== -1) sortState.players.col = ptsIdx;
    renderPlayers();
  } catch(e) {
    document.getElementById("player-table-wrap").innerHTML = `<div class="loading">Error: ${e.message}</div>`;
  }
}

function filterPlayers() { renderPlayers(); }

function renderPlayers() {
  const search = document.getElementById("player-search").value.toLowerCase();
  const posFil = document.getElementById("pos-filter").value;
  const teamFil = document.getElementById("team-filter").value;
  const cols = playerData.cols;
  const rows = playerData.rows;
  if (!cols.length) return;

  let filtered = rows.filter(r => {
    const name = String(r[1]||"").toLowerCase();
    const pos  = String(r[3]||"");
    const team = String(r[2]||"");
    if (search && !name.includes(search)) return false;
    if (posFil && posGroup(pos) !== posFil) return false;
    if (teamFil && team !== teamFil) return false;
    return true;
  });

  // Sort
  const {col, dir} = sortState.players;
  filtered.sort((a,b) => {
    const av = String(a[col]||"").replace("%","").replace("+","");
    const bv = String(b[col]||"").replace("%","").replace("+","");
    const an = parseFloat(av); const bn = parseFloat(bv);
    if (!isNaN(an) && !isNaN(bn)) return (an - bn) * dir;
    return av.localeCompare(bv) * dir;
  });

  document.getElementById("player-count").textContent = `${filtered.length} players`;

  const hdrs = playerData.cols;

  // Columns hidden from main table — only shown on player card
  // Hidden: W, L, T (card Record section), EV Sh%, EVO, GAR, WAR (card Advanced section)
  const HIDDEN_MAIN = new Set(["W","L","T","EV Sh%","EVO","GAR","WAR"]);

  // PTS column index for highlighting (changes if W/L/T added before it)
  const ptsColIdx = hdrs.findIndex(h => h.trim() === "PTS");

  // Build display column list (skip col 0 = #, skip hidden cols)
  // We keep col indices into the original row for data access
  const displayColIdxs = hdrs.map((h,i) => i)
    .filter(i => i > 0 && !HIDDEN_MAIN.has(String(hdrs[i]||"").trim()));

  const headers = displayColIdxs.map(origIdx => {
    const c   = hdrs[origIdx];
    const ss  = sortState.players;
    // Sort col maps to display position
    const dispPos = displayColIdxs.indexOf(origIdx);
    const cls = ss.col === origIdx ? (ss.dir === 1 ? "sorted-asc" : "sorted-desc") : "";
    return `<th class="${cls}" onclick="sortTable('players',${origIdx})">${c}</th>`;
  });

  const bodyRows = filtered.map((r, rank) => {
    const cells = displayColIdxs.map(origIdx => {
      const v = String(r[origIdx] || "").trim() || "-";
      if (origIdx === 1) return makeClickable(r[origIdx] || "-", r, playerData.cols, false);
      if (origIdx === 2) return `<td><span class="team-badge">${v}</span></td>`;
      if (origIdx === 3) return `<td><span class="pos-badge">${posShort(r[origIdx])}</span></td>`;
      if (origIdx === ptsColIdx) return `<td class="pts-cell">${v}</td>`;
      return `<td>${v}</td>`;
    });
    return `<tr><td class="rank-cell">${rank+1}</td>${cells.join("")}</tr>`;
  });

  document.getElementById("player-table-wrap").innerHTML = `
    <table>
      <thead><tr><th>#</th>${headers.join("")}</tr></thead>
      <tbody>${bodyRows.join("") || '<tr><td colspan="99" style="text-align:center;padding:30px;color:#888">No players match your search</td></tr>'}</tbody>
    </table>`;
}

// ── GOALIE STATS ──────────────────────────────────────────────────────────────
let goalieData = { cols: [], rows: [] };

async function loadGoalies() {
  try {
    const rawG = await fetchTab("Goalie Stats");
    goalieData = { cols: rawG.cols, rows: rawG.rows, numCols: rawG.numCols };
    const svIdx = goalieData.cols.findIndex(h => h.trim() === "Save %");
    if (svIdx !== -1) sortState.goalies.col = svIdx;
    renderGoalies();
  } catch(e) {
    document.getElementById("goalie-table-wrap").innerHTML = `<div class="loading">Error: ${e.message}</div>`;
  }
}

function filterGoalies() { renderGoalies(); }

function renderGoalies() {
  const search = document.getElementById("goalie-search").value.toLowerCase();
  const cols = goalieData.cols;
  const rows = goalieData.rows;
  if (!cols.length) return;

  let filtered = rows.filter(r => {
    const name = String(r[1]||"").toLowerCase();
    return !search || name.includes(search);
  });

  const {col, dir} = sortState.goalies;
  filtered.sort((a,b) => {
    const av = a[col]; const bv = b[col];
    const an = parseFloat(av); const bn = parseFloat(bv);
    if (!isNaN(an) && !isNaN(bn)) return (an - bn) * dir;
    return String(av).localeCompare(String(bv)) * dir;
  });

  document.getElementById("goalie-count").textContent = `${filtered.length} goalies`;

  const gHdrs = goalieData.cols;
  const headers = gHdrs.slice(1).map((c, i) => {
    const colIdx = i + 1;
    const ss = sortState.goalies;
    const cls = ss.col === colIdx ? (ss.dir === 1 ? "sorted-asc" : "sorted-desc") : "";
    return `<th class="${cls}" onclick="sortTable('goalies',${colIdx})">${c}</th>`;
  });

  const bodyRows = filtered.map((r, rank) => {
    const cells = r.slice(1).map((v, i) => {
      const colIdx = i + 1;
      if (colIdx === 1) return makeClickable(v || "-", r, playerData.cols, false);
      if (colIdx === 2) return `<td><span class="team-badge">${v || "-"}</span></td>`;
      if (colIdx === 10) return `<td class="pts-cell">${v || "-"}</td>`;
      return `<td>${v !== null && v !== "" ? v : "-"}</td>`;
    });
    return `<tr><td class="rank-cell">${rank+1}</td>${cells.join("")}</tr>`;
  });

  document.getElementById("goalie-table-wrap").innerHTML = `
    <table>
      <thead><tr><th>#</th>${headers.join("")}</tr></thead>
      <tbody>${bodyRows.join("") || '<tr><td colspan="99" style="text-align:center;padding:30px;color:#888">No goalies match your search</td></tr>'}</tbody>
    </table>`;
}

// ── SORT ──────────────────────────────────────────────────────────────────────
function sortTable(which, origIdx) {
  const ss = sortState[which];
  if (ss.col === origIdx) { ss.dir *= -1; }
  else { ss.col = origIdx; ss.dir = -1; }
  which === "players" ? renderPlayers() : renderGoalies();
}

// ── TEAMS ─────────────────────────────────────────────────────────────────────
let teamCache = {};
let activeTeam = null;

async function loadTeams() {
  const nav = document.getElementById("team-nav");
  nav.innerHTML = TEAMS.map(t =>
    `<button class="team-btn" onclick="showTeam('${t.abbr}', this)">${t.abbr}</button>`
  ).join("");
  // Auto-load first team
  const firstBtn = nav.querySelector(".team-btn");
  if (firstBtn) showTeam(TEAMS[0].abbr, firstBtn);
}

async function showTeam(abbr, btn) {
  document.querySelectorAll(".team-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeTeam = abbr;

  if (teamCache[abbr]) {
    renderTeamFromMaster(abbr, teamCache[abbr]);
    return;
  }

  document.getElementById("team-content").innerHTML = `<div class="loading"><div class="spinner"></div>Loading ${abbr}...</div>`;

  try {
    // Filter from master player/goalie data instead of team-specific tab
    // This avoids gviz issues with merged cells on team tabs
    await ensureMasterDataLoaded();
    teamCache[abbr] = { sk: playerData, gl: goalieData };
    renderTeamFromMaster(abbr, teamCache[abbr]);
  } catch(e) {
    document.getElementById("team-content").innerHTML = `<div class="loading">Error: ${e.message}</div>`;
  }
}

async function ensureMasterDataLoaded() {
  // Load player/goalie data if not already loaded
  if (!playerData.cols.length) await loadPlayers();
  if (!goalieData.cols.length) await loadGoalies();
}

function renderTeamFromMaster(abbr, { sk, gl }) {
  const team = TEAMS.find(t => t.abbr === abbr);
  const teamName = team ? team.name.toUpperCase() : abbr;

  const skHeaders = sk.cols;
  const glHeaders = gl.cols;


  // Match team value against target abbreviation
  // Handles: exact abbr match, full name match, case-insensitive, partial
  const ABBR_TO_KEYWORDS = {
    "CAR": ["carolina","hurricanes"],
    "CBJ": ["columbus"],
    "SJS": ["san jose","sharks"],
    "LAK": ["la kings","kings","angeles"],
    "DAL": ["dallas","stars"],
    "VGK": ["golden knights","vegas"],
    "TOR": ["toronto","maple leafs","leafs"],
    "NSH": ["nashville","predators"],
    "OTT": ["ottawa","senators"],
    "MTL": ["montreal","canadiens"],
  };

  function matchesTeam(cellVal, targetAbbr) {
    const v = String(cellVal||"").trim();
    if (!v) return false;
    // Exact abbreviation match (most common — publisher writes abbr)
    if (v === targetAbbr) return true;
    if (v.toUpperCase() === targetAbbr) return true;
    // Full or partial name match (fallback for when publisher wrote full name)
    const vLower = v.toLowerCase();
    const keywords = ABBR_TO_KEYWORDS[targetAbbr] || [];
    return keywords.some(kw => vLower.includes(kw));
  }

  const skRows = sk.rows.filter(r => matchesTeam(r[2], abbr));
  const glRows = gl.rows.filter(r => matchesTeam(r[2], abbr));

  // Find PTS and SV% column indices
  const ptsIdx = skHeaders.findIndex(h => String(h).trim() === "PTS");
  const svIdx  = glHeaders.findIndex(h => String(h).trim() === "Save %");

  // Sort skaters by PTS desc
  skRows.sort((a,b) => (parseFloat(b[ptsIdx]||0) - parseFloat(a[ptsIdx]||0)));

  // Build totals row — sum counting stats by column name
  // Non-summable: #, Username, Team, Platform, Position, per-game rates, percentages, ratings, advanced
  const NON_SUM = new Set(["#","Username","Team","Platform","Position",
    "Pts/GP","G/GP","A/GP","Shot %","Shots On Net %","Pass %","Faceoff %",
    "Offense Rating","Defense Rating","Teamplay Rating",
    "EV Sh%","EVO","GAR","WAR","Plus Minus","Possession (mins)","TOI (mins)"]);

  const totals = new Array(skHeaders.length).fill("");
  totals[0] = "TOTAL";
  if (skRows.length) {
    skHeaders.forEach((h, ci) => {
      const hName = String(h||"").trim();
      if (!hName || NON_SUM.has(hName)) return;
      const sum = skRows.reduce((acc, r) => acc + (parseFloat(r[ci]||0)||0), 0);
      totals[ci] = Number.isInteger(sum) || Math.abs(sum - Math.round(sum)) < 0.001
        ? Math.round(sum) : sum.toFixed(2);
    });
    // Plus Minus: sum it (it can be negative)
    const pmIdx = skHeaders.findIndex(h => String(h).trim() === "Plus Minus");
    if (pmIdx !== -1) {
      const pmSum = skRows.reduce((acc,r) => acc + (parseInt(r[pmIdx]||0)||0), 0);
      totals[pmIdx] = pmSum > 0 ? "+" + pmSum : String(pmSum);
    }
    // TOI: sum minutes
    const toiIdx = skHeaders.findIndex(h => String(h).trim() === "TOI (mins)");
    if (toiIdx !== -1) {
      totals[toiIdx] = skRows.reduce((acc,r) => acc + (parseFloat(r[toiIdx]||0)||0), 0).toFixed(1);
    }
  }

  // For team tabs: skip col 0 (#/rank) and col 2 (Team abbr - redundant)
  // skater cols: 0=#, 1=Username, 2=Team, 3=Platform, 4=Position, 5=GP, 6=G...
  // goalie cols: 0=#, 1=Username, 2=Team, 3=Platform, 4=GP, 5=W...
  const SKIP_COLS = new Set([0, 2]); // skip # and Team columns

  function makeTable(headers, dataRows, highlightCol, totalRow) {
    // Find last non-empty header
    let lastCol = 0;
    headers.forEach((h,i) => { if (String(h||"").trim()) lastCol = i; });
    const useCols = lastCol + 1;

    // Build index map: original col index -> display col index (skipping SKIP_COLS)
    const displayCols = [];
    for (let i = 0; i < useCols; i++) {
      if (!SKIP_COLS.has(i)) displayCols.push(i);
    }

    const hdr = displayCols.map((origIdx, dispIdx) => {
      const h = String(headers[origIdx]||"").trim();
      return `<th onclick="sortTeamTable(this,${dispIdx})" style="cursor:pointer;white-space:nowrap">${h}</th>`;
    }).join("");

    const body = dataRows.map(r =>
      `<tr>${displayCols.map((origIdx, dispIdx) => {
        const v = String(r[origIdx]||"").trim() || "-";
        if (origIdx === 1) {
          // Build full rowData with all original cols for the modal
          const fullRow = displayCols.map(i => String(r[i]||"").trim());
          const fullHdrs = displayCols.map(i => String(headers[i]||"").trim());
          // Add Team back for modal context
          const teamVal = String(r[2]||"").trim();
          const rowWithTeam = [...r];
          const hdrsWithTeam = [...headers];
          return makeClickable(v, rowWithTeam, hdrsWithTeam, false);
        }
        if (origIdx === highlightCol) return `<td class="pts-cell">${v}</td>`; // PTS or SV%
        return `<td>${v}</td>`;
      }).join("")}</tr>`
    ).join("");

    const tot = totalRow
      ? `<tr class="totals-row">${displayCols.map(origIdx =>
          `<td>${String(totalRow[origIdx]||"").trim()}</td>`).join("")}</tr>`
      : "";

    return body
      ? `<table><thead><tr>${hdr}</tr></thead><tbody>${body}${tot}</tbody></table>`
      : `<p style="padding:16px;color:#888">No data yet for this team.</p>`;
  }

  document.getElementById("team-content").innerHTML = `
    <div style="background:#fff;border-radius:8px;box-shadow:0 2px 16px rgba(0,0,0,0.08);overflow:hidden;margin-bottom:24px;">
      <div class="team-banner">${teamName}</div>
      <div class="subsection-label">Skaters</div>
      <div class="table-wrap" style="border-radius:0;box-shadow:none;max-height:none;">
        ${makeTable(skHeaders, skRows, ptsIdx, skRows.length ? totals : null)}
      </div>
      ${glHeaders.length ? `
        <div class="subsection-label" style="margin-top:2px;">Goalies</div>
        <div class="table-wrap" style="border-radius:0;box-shadow:none;max-height:none;">
          ${makeTable(glHeaders, glRows, svIdx, null)}
        </div>` : ""}
    </div>`;
}


function sortTeamTable(th, colIdx) {
  const table = th.closest("table");
  const tbody = table.querySelector("tbody");
  const rows  = Array.from(tbody.querySelectorAll("tr:not(.totals-row)"));
  const totalsRow = tbody.querySelector(".totals-row");
  const asc   = th.dataset.sort !== "asc";
  th.closest("thead").querySelectorAll("th").forEach(t => { delete t.dataset.sort; });
  th.dataset.sort = asc ? "asc" : "desc";

  rows.sort((a, b) => {
    const av = a.cells[colIdx]?.textContent.trim() || "";
    const bv = b.cells[colIdx]?.textContent.trim() || "";
    const an = parseFloat(av.replace("%",""));
    const bn = parseFloat(bv.replace("%",""));
    if (!isNaN(an) && !isNaN(bn)) return asc ? an - bn : bn - an;
    return asc ? av.localeCompare(bv) : bv.localeCompare(av);
  });

  rows.forEach(r => tbody.appendChild(r));
  if (totalsRow) tbody.appendChild(totalsRow);
}



// ── RECENT GAMES ──────────────────────────────────────────────────────────────
let gameLogData    = { cols: [], rows: [] };
let skaterLogData  = { cols: [], rows: [] };
let goalieLogData  = { cols: [], rows: [] };
let allGamesRaw    = [];

// Full team name lookup from abbreviation (for display)
const ABBR_TO_FULL = {
  CAR:"Carolina Hurricanes", CBJ:"Columbus Blue Jackets",
  SJS:"San Jose Sharks",     LAK:"LA Kings",
  DAL:"Dallas Stars",        VGK:"Vegas Golden Knights",
  TOR:"Toronto Maple Leafs", NSH:"Nashville Predators",
  OTT:"Ottawa Senators",     MTL:"Montreal Canadiens",
};

// Map team name variants to abbreviation (for game log lookup)
function nameToAbbr(name) {
  const n = String(name||"").toLowerCase();
  for (const [abbr, kws] of Object.entries(ABBR_TO_KEYWORDS)) {
    if (kws.some(kw => n.includes(kw))) return abbr;
  }
  return name.slice(0,3).toUpperCase();
}

function abbrToDisplay(abbr) {
  return ABBR_TO_FULL[abbr] || abbr;
}

async function loadGames() {
  try {
    // Load all three logs from source sheet
    console.log("Loading Game Log...");
    const gl = await fetchSourceTab("Game Log");
    gameLogData = gl;

    console.log("Loading Skater Log...");
    const sl = await fetchSourceTab("Skater Log");
    skaterLogData = sl;

    console.log("Loading Goalie Log...");
    const gol = await fetchSourceTab("Goalie Log");
    goalieLogData = gol;

    // Build game list sorted newest first
    const glIdx = {};
    gl.cols.forEach((c,i) => glIdx[c] = i);

    allGamesRaw = gl.rows.filter(r => String(r[0]||"").trim()); // skip blank rows

    // Populate team filter
    const teamNames = new Set();
    allGamesRaw.forEach(r => {
      teamNames.add(String(r[glIdx["Team 1"]]||"").trim());
      teamNames.add(String(r[glIdx["Team 2"]]||"").trim());
    });
    const sel = document.getElementById("game-team-filter");
    [...teamNames].sort().forEach(t => {
      if (!t) return;
      const o = document.createElement("option");
      o.value = t; o.textContent = t; sel.appendChild(o);
    });

    renderGames();
  } catch(e) {
    document.getElementById("games-list").innerHTML =
      `<div class="loading">Error loading games: ${e.message}<br><small>Make sure the source sheet is shared publicly.</small></div>`;
    console.error(e);
  }
}

function filterGames() { renderGames(); }

function renderGames() {
  const teamFil = document.getElementById("game-team-filter").value;
  const gl = gameLogData;
  const glIdx = {};
  gl.cols.forEach((c,i) => glIdx[c] = i);

  let games = [...allGamesRaw];
  if (teamFil) {
    games = games.filter(r =>
      String(r[glIdx["Team 1"]]||"") === teamFil ||
      String(r[glIdx["Team 2"]]||"") === teamFil
    );
  }

  // Sort newest first by date
  games.sort((a,b) => String(b[glIdx["Date"]]||"").localeCompare(String(a[glIdx["Date"]]||"")));

  document.getElementById("game-count").textContent = `${games.length} games`;

  if (!games.length) {
    document.getElementById("games-list").innerHTML =
      `<div class="loading">No games found.</div>`;
    return;
  }

  const html = `<div class="games-grid">${games.map(r => {
    const mid   = String(r[glIdx["Match ID"]]||"").trim();
    const date  = String(r[glIdx["Date"]]||"").trim();
    const t1    = String(r[glIdx["Team 1"]]||"").trim();
    const t2    = String(r[glIdx["Team 2"]]||"").trim();
    const s1    = String(r[glIdx["Team 1 Score"]]||"0").trim();
    const s2    = String(r[glIdx["Team 2 Score"]]||"0").trim();
    const r1    = String(r[glIdx["Team 1 Result"]]||"").trim();
    const r2    = String(r[glIdx["Team 2 Result"]]||"").trim();
    const ot    = String(r[glIdx["OT"]]||"").trim().toLowerCase() === "yes";
    const early = String(r[glIdx["Ended Early"]]||"").trim().toLowerCase() === "yes";
    const lagout= String(r[glIdx["Lagout"]]||"").trim().toLowerCase() === "yes";

    const t1wins = r1 === "Win";
    const t2wins = r2 === "Win";

    let badges = "";
    if (ot)     badges += `<span class="badge ot">OT</span>`;
    if (lagout) badges += `<span class="badge lgot">LAGOUT</span>`;
    else if (early) badges += `<span class="badge lgot">MERCY</span>`;

    return `<div class="game-card" onclick="openBoxScore(${JSON.stringify(mid)}, ${JSON.stringify(r)}, ${JSON.stringify(gl.cols)})">
      <div class="game-date">${date}</div>
      <div class="game-teams">
        <div class="game-team">
          <div class="game-team-name ${t1wins ? "winner":""}">${t1}</div>
          <div class="game-badge">${t1wins ? '<span class="badge">W</span>':''}</div>
        </div>
        <div class="game-score-wrap">
          <div class="game-score ${t1wins ? "":"loser"}">${s1}</div>
          <div class="game-sep">–</div>
          <div class="game-score ${t2wins ? "":"loser"}">${s2}</div>
        </div>
        <div class="game-team">
          <div class="game-team-name ${t2wins ? "winner":""}">${t2}</div>
          <div class="game-badge">${t2wins ? '<span class="badge">W</span>':''}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        ${badges}
        <span class="game-arrow">&#8250;</span>
      </div>
    </div>`;
  }).join("")}</div>`;

  document.getElementById("games-list").innerHTML = html;
}

// ── BOX SCORE MODAL ───────────────────────────────────────────────────────────
function openBoxScore(matchId, gameRow, gameCols) {
  const glIdx = {};
  gameCols.forEach((c,i) => glIdx[c] = i);

  const t1 = String(gameRow[glIdx["Team 1"]]||"").trim();
  const t2 = String(gameRow[glIdx["Team 2"]]||"").trim();
  const s1 = String(gameRow[glIdx["Team 1 Score"]]||"0").trim();
  const s2 = String(gameRow[glIdx["Team 2 Score"]]||"0").trim();
  const date = String(gameRow[glIdx["Date"]]||"").trim();
  const ot   = String(gameRow[glIdx["OT"]]||"").trim().toLowerCase() === "yes";

  document.getElementById("box-scoreline").textContent =
    `${t1}  ${s1} – ${s2}  ${t2}`;
  document.getElementById("box-meta").textContent =
    `${date}${ot ? "  •  OT" : ""}  •  Match ${matchId}`;

  // Match IDs can be compound (lagout merges): "123+456"
  const matchIds = matchId.split("+").map(s => s.trim());

  // Filter skater rows for this match
  const skIdx = {};
  skaterLogData.cols.forEach((c,i) => skIdx[c] = i);
  const skRows = skaterLogData.rows.filter(r =>
    matchIds.includes(String(r[skIdx["Match ID"]]||"").trim())
  );

  // Filter goalie rows for this match
  const glGIdx = {};
  goalieLogData.cols.forEach((c,i) => glGIdx[c] = i);
  const glRows = goalieLogData.rows.filter(r =>
    matchIds.includes(String(r[glGIdx["Match ID"]]||"").trim())
  );

  // Split by team
  const teams = [t1, t2];
  let bodyHtml = "";

  teams.forEach((team, ti) => {
    const teamSkaters = skRows.filter(r =>
      String(r[skIdx["Team"]]||"").trim().toLowerCase() === team.toLowerCase()
    );
    const teamGoalies = glRows.filter(r =>
      String(r[glGIdx["Team"]]||"").trim().toLowerCase() === team.toLowerCase()
    );

    const score = ti === 0 ? s1 : s2;
    const result = ti === 0
      ? String(gameRow[glIdx["Team 1 Result"]]||"").trim()
      : String(gameRow[glIdx["Team 2 Result"]]||"").trim();

    bodyHtml += `
      <div class="box-team-section">
        <div class="box-team-label">${team} &nbsp; <span style="font-size:22px">${score}</span>
          <span style="font-size:13px;font-weight:400;color:${result==="Win"?"#27ae60":"var(--accent)"};margin-left:10px">${result}</span>
        </div>`;

    // Skater table
    if (teamSkaters.length) {
      const skHdr = ["Player","Pos","G","A","PTS","Shots","Shot%","Hits","TKA","BS","INT","GVA","FOW","FOL","FO%","+/-","PIMs","TOI"];
      bodyHtml += `<div class="box-table-wrap"><table class="box-table">
        <thead><tr>${skHdr.map(h=>`<th>${h}</th>`).join("")}</tr></thead>
        <tbody>${teamSkaters.map(r => {
          const g    = String(r[skIdx["Goals"]]||"0");
          const a    = String(r[skIdx["Assists"]]||"0");
          const pts  = (parseInt(g)||0) + (parseInt(a)||0);
          const sh   = String(r[skIdx["Shots"]]||"0");
          const shg  = parseInt(r[skIdx["Goals"]])||0;
          const sha  = parseInt(r[skIdx["Shot Attempts"]])||1;
          const shotpct = sha > 0 ? ((shg/sha)*100).toFixed(1)+"%" : "-";
          const pos  = String(r[skIdx["Position"]]||"").replace("Men","").replace("left","L").replace("right","R").replace("Wing","W").replace("center","C").replace("defense","D");
          const name = String(r[skIdx["Username"]]||"");
          const pm   = parseInt(r[skIdx["Plus Minus"]]||0);
          const pmStr = pm > 0 ? `+${pm}` : String(pm);
          return `<tr>
            <td>${name}</td>
            <td>${pos}</td>
            <td>${g}</td><td>${a}</td><td>${pts}</td>
            <td>${sh}</td><td>${shotpct}</td>
            <td>${r[skIdx["Hits"]]||0}</td>
            <td>${r[skIdx["Takeaways"]]||0}</td>
            <td>${r[skIdx["Blocked Shots"]]||0}</td>
            <td>${r[skIdx["Interceptions"]]||0}</td>
            <td>${r[skIdx["Giveaways"]]||0}</td>
            <td>${r[skIdx["Faceoff Wins"]]||0}</td>
            <td>${r[skIdx["Faceoff Losses"]]||0}</td>
            <td>${r[skIdx["Faceoff %"]]||"-"}</td>
            <td>${pmStr}</td>
            <td>${r[skIdx["PIMs"]]||0}</td>
            <td>${r[skIdx["TOI"]]||0}</td>
          </tr>`;
        }).join("")}</tbody>
      </table></div>`;
    }

    // Goalie table
    if (teamGoalies.length) {
      const glHdr = ["Goalie","SA","Saves","GA","SV%","BrkSv","PenSv","DivSv"];
      bodyHtml += `<div class="box-table-wrap" style="margin-top:8px"><table class="box-table">
        <thead><tr>${glHdr.map(h=>`<th>${h}</th>`).join("")}</tr></thead>
        <tbody>${teamGoalies.map(r => {
          return `<tr>
            <td>${r[glGIdx["Username"]]||""}</td>
            <td>${r[glGIdx["Shots Against"]]||0}</td>
            <td>${r[glGIdx["Saves"]]||0}</td>
            <td>${r[glGIdx["Goals Against"]]||0}</td>
            <td>${r[glGIdx["Save %"]]||"-"}</td>
            <td>${r[glGIdx["Breakaways Saves"]]||0}</td>
            <td>${r[glGIdx["Penalty Shot Saves"]]||0}</td>
            <td>${r[glGIdx["Diving Saves"]]||0}</td>
          </tr>`;
        }).join("")}</tbody>
      </table></div>`;
    }

    bodyHtml += `</div>`;
    if (ti === 0) bodyHtml += `<div class="box-divider"></div>`;
  });

  document.getElementById("box-body").innerHTML = bodyHtml;
  document.getElementById("box-modal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeBoxScoreModal() {
  document.getElementById("box-modal").classList.remove("open");
  document.body.style.overflow = "";
}

function closeBoxModal(e) {
  if (e.target === document.getElementById("box-modal")) closeBoxScoreModal();
}

function openPlayerModal(playerName, rowData, headers, isGoalie) {
  // Build lookup: header name -> value
  const stats = {};
  headers.forEach((h, i) => { stats[String(h).trim()] = String(rowData[i]||"").trim() || "-"; });

  const team = stats["Team"] || "";
  const pos  = stats["Position"] || (isGoalie ? "Goalie" : "");
  const plat = stats["Platform"] || "";

  document.getElementById("modal-name").textContent = playerName;
  document.getElementById("modal-meta").innerHTML = `
    <span><strong style="color:#fff">${team}</strong></span>
    <span>${pos}</span>
    <span>${plat.toUpperCase()}</span>`;

  const sections = isGoalie ? GL_CARD_SECTIONS : SK_CARD_SECTIONS;
  let html = "";
  sections.forEach(sec => {
    const boxes = sec.cols
      .filter(col => stats[col] !== undefined && stats[col] !== "-")
      .map(col => {
        const isHL  = sec.highlight && sec.highlight.includes(col);
        const isAdv = sec.advanced;
        return `
          <div class="stat-box ${isHL ? "highlight" : ""} ${isAdv ? "advanced" : ""}">
            <div class="stat-val">${stats[col] || "-"}</div>
            <div class="stat-lbl">${col}</div>
          </div>`;
      }).join("");
    if (!boxes) return;
    html += `<div class="stat-section-title">${sec.title}</div>
             <div class="stat-grid">${boxes}</div>`;
  });

  document.getElementById("modal-body").innerHTML = html;
  document.getElementById("player-modal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closePlayerModal() {
  document.getElementById("player-modal").classList.remove("open");
  document.body.style.overflow = "";
}

function closeModal(e) {
  if (e.target === document.getElementById("player-modal")) closePlayerModal();
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closePlayerModal(); });

// Make a player-name cell clickable
function makeClickable(name, rowData, headers, isGoalie) {
  return `<td class="player-name clickable" onclick='openPlayerModal(${JSON.stringify(name)}, ${JSON.stringify(rowData)}, ${JSON.stringify(headers)}, ${isGoalie})'>${name}</td>`;
}
